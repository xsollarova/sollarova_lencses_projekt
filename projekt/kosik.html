<!DOCTYPE html>
<html lang="sk">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="Kristína Sollárová, David Lencsés">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Košík</title>
</head>

<body>

    <header class="hlavicka">
        <div class="hlavicka-obsah">

            <div class="logo" id="logo">
                <a href="index.html">LOGO</a>
            </div>


            <div class="icons">
                <a href="kosik.html">košík</a>
            </div>

        </div>
    </header>

    <main>

        <section class="content">

            <section class="steps">
                <section class="checkout-steps">
                    <div class="step active">zhrnutie</div>
                    <span class="step-arrow">=></span>
                    <div class="step">dodacie údaje</div>
                    <span class="step-arrow">=></span>
                    <div class="step">doprava a platba</div>
                </section>
            </section>

            <div class="cart-layout">

                <section class="cart-items">

                    <article class="cart-item">
                        <div class="cart-item-image">
                            <img src="images/placeholder.png" alt="Produkt">
                        </div>

                        <div class="cart-item-info">
                            <h2 class="product-name">názov</h2>
                            <p class="product-brand">značka</p>
                            <p class="product-size">veľkosť</p>

                            <div class="quantity-controls">
                                <span class="quantity-label">množstvo: <span class="quantity-value">xx</span></span>
                                <button type="button" class="quantity-btn minus">−</button>
                                <button type="button" class="quantity-btn plus">+</button>
                            </div>
                        </div>

                        <div class="cart-item-price">
                            <p>CENA €€€</p>
                        </div>

                        <div class="cart-item-remove">
                            <button type="button" class="remove-btn">X</button>
                        </div>
                    </article>




                    <section class="discount-code">
                        <label for="discount">uplatniť kód:</label>
                        <input type="text" id="discount" name="discount" placeholder="........">
                    </section>

                </section>
            </div>




            <section class="order-summary">
                <h2>SUMMARY</h2>

                <div class="summary-items">
                    <div class="summary-item">
                        <span>názov</span>
                        <span>€€</span>
                    </div>
                    <div class="summary-item">
                        <span>názov</span>
                        <span>€€</span>
                    </div>
                    <div class="summary-item">
                        <span>názov</span>
                        <span>€€</span>
                    </div>
                </div>

                <div class="summary-total">
                    <span>total</span>
                    <span>€€€</span>
                </div>

                <a href="udaje.html" class="continue-btn">pokračovať</a>
            </section>

            <section class="back-to-top">
                <a href="#">späť hore ↑</a>
            </section>

        </section>

    </main>


    <footer class="pata">
        <div class="container">
            kontakt | obchodné podmienky | info
        </div>
        <div class="footer-logo">
            LOGO
        </div>
    </footer>

</body>

</html>
