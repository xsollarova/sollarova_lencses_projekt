<div class="popup" id="loginPopup">

    <div class="popup-box">

        <button class="popup-close" id="popupClose">&times;</button>

        <!-- prihlasenie -->
        <section class="login">
            <h1>PRIHLÁSENIE</h1>

            <form class="form">

                <div class="form-group">
                    <input type="email" name="login_email" placeholder="email">
                </div>

                <div class="form-group">
                    <input type="password" name="login_password" placeholder="heslo">
                </div>

                <button type="submit" class="popup-btn">prihlásiť sa</button>

            </form>

            <a href="#" class="link">zabudnuté heslo?</a>
        </section>

        <!-- deliacia ciara -->
        <div class="divider"></div>

        <!-- registrácia -->
        <section class="register">
            <h1>REGISTRÁCIA</h1>

            <form class="form">

                <div class="form-group">
                    <input type="text" name="first_name" placeholder="meno">
                </div>

                <div class="form-group">
                    <input type="text" name="last_name" placeholder="priezvisko">
                </div>

                <div class="form-group">
                    <input type="email" name="register_email" placeholder="email">
                </div>

                <div class="form-group">
                    <input type="password" name="register_password" placeholder="heslo">
                </div>

                <div class="form-group">
                    <input type="password" name="register_password_confirm" placeholder="potvrdenie hesla">
                </div>

                <button type="submit" class="popup-btn">registrovať sa</button>

            </form>

            <a href="#" class="link">podmienky</a>
        </section>

    </div>

</div>
