<!DOCTYPE html>
<html lang="sk">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="Kristína Sollárová, David Lencsés">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Údaje</title>
</head>

<body>

    <header class="hlavicka">
        <div class="hlavicka-obsah">

            <div class="logo" id="logo">
                <a href="index.html">LOGO</a>
            </div>

            <div class="search-bar">
                <input type="text" placeholder="hľadať...">
            </div>

            <div class="icons">
                <a href="kosik.html">košík</a>
            </div>

        </div>
    </header>

    <main>

        <section class="content">

            <section class="steps">
                <section class="checkout-steps">
                    <div class="step active">zhrnutie</div>
                    <span class="step-arrow">=></span>
                    <div class="step">dodacie údaje</div>
                    <span class="step-arrow">=></span>
                    <div class="step">doprava a platba</div>
                </section>
            </section>

        </section>

        <section class="customer-info">
            <form class="customer-form">

                <div class="form-group">
                    <input type="text" name="meno" placeholder="meno">
                </div>

                <div class="form-group">
                    <input type="text" name="priezvisko" placeholder="priezvisko">
                </div>

                <div class="form-group">
                    <input type="tel" name="telefon" placeholder="telefónne číslo">
                </div>

                <div class="form-group">
                    <input type="email" name="email" placeholder="email">
                </div>

                <div class="form-group">
                    <input type="text" name="mesto" placeholder="mesto">
                </div>

                <div class="form-row">
                    <div class="form-group small">
                        <input type="text" name="psc" placeholder="psč">
                    </div>

                    <div class="form-group small">
                        <input type="text" name="cislo_domu" placeholder="číslo domu">
                    </div>
                </div>

            </form>
        </section>


        <section class="order-summary">
            <h2>SUMMARY</h2>

            <div class="summary-items">
                <div class="summary-item">
                    <span>názov</span>
                    <span>€€</span>
                </div>
                <div class="summary-item">
                    <span>názov</span>
                    <span>€€</span>
                </div>
                <div class="summary-item">
                    <span>názov</span>
                    <span>€€</span>
                </div>
            </div>

            <div class="summary-total">
                <span>total</span>
                <span>€€€</span>
            </div>

            <a href="platba.html" class="continue-btn">pokračovať</a>
        </section>

        <section class="back-to-top">
            <a href="#">späť hore ↑</a>
        </section>

        </section>

    </main>


    <footer class="pata">
        <div class="container">
            kontakt | obchodné podmienky | info
        </div>
        <div class="footer-logo">
            LOGO
        </div>
    </footer>

</body>

</html>
